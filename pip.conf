# Local development: install dependencies from the private Dependably registry
# instead of public PyPI. Used by `make install` (which points PIP_CONFIG_FILE
# at this file). The CI pipeline configures the same index at runtime from the
# REGISTRY_URL / REGISTRY_KEY variables.
#
# Credentials are NOT stored here. Add them to ~/.netrc (chmod 600):
#   machine dependably.northwardlabs.ca
#     login ci
#     password <your REGISTRY_KEY token>
[global]
index-url = https://dependably.northwardlabs.ca/simple/
# Fallback to public PyPI for packages the registry doesn't serve.
extra-index-url = https://pypi.org/simple/
