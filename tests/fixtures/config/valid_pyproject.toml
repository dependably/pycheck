[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sample-project"
version = "1.2.3"
description = "A valid sample manifest"
requires-python = ">=3.9"
license = "MIT"
dependencies = [
    "requests==2.31.0",
    "click>=8.0",
    "typing-extensions; python_version < '3.10'",
]

[project.optional-dependencies]
dev = ["pytest==7.4.0", "black>=22.0"]

[project.scripts]
sample = "sample.cli:main"
