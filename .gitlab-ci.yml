# CI/CD pipeline for pycheck
#
# Flow:  test  →  build  →  sbom  →  publish (manual approval, default branch only)
#
#   test     lint + unit tests + security scans on every push/MR
#   build    wheel + sdist (python -m build), kept as a job artifact
#   sbom     generate a CycloneDX SBOM (every pipeline); publish it to a
#            Dependency-Track server on the default branch
#   publish  manual gate that uploads the built distributions to the private
#            registry; a sibling `publish-github` job mirrors the source to the
#            public GitHub repo (re-validated by .github/workflows/ci.yml there)
#
# Mirrors the checker-npm / dependably-community pipelines: scanner images are
# pinned by digest so versions can't drift; the base python image is pinned by
# tag. Required CI/CD variables (Settings → CI/CD → Variables), "Masked":
#   REGISTRY_URL          private package index base, e.g. https://dependably.northwardlabs.ca/
#   REGISTRY_KEY          upload token for that registry (twine password)
#   REGISTRY_USER         (optional) twine username; defaults to __token__
#   dependencyTrack_url   Dependency-Track base URL
#   dependencyTrack_token DT API key with BOM_UPLOAD + PROJECT_CREATION_UPLOAD
#   SNYK_TOKEN            Snyk Code (SAST) token — set UNPROTECTED + masked so
#                         merge-request pipelines (unprotected branches) can scan
#   SONAR_TOKEN           SonarQube analysis token (masked)
#   SONAR_HOST_URL        SonarQube server base URL

# Avoid running a branch pipeline AND an MR pipeline at once when an MR is open.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  # Cancel a running pipeline when a newer commit is pushed to the same ref —
  # only the interruptible jobs (everything except the side-effecting publish
  # jobs, see below) are cancelled.
  auto_cancel:
    on_new_commit: interruptible

# Jobs are interruptible by default so workflow:auto_cancel can cancel redundant
# runs; the publish / sbom-publish jobs override this to false (don't kill an
# in-flight upload).
default:
  image: python:3.12-slim
  interruptible: true

stages:
  - test
  - build
  - sbom
  - publish

# Route pip through the private Dependably registry first (PyPI feed at
# $REGISTRY_URL/simple/, HTTP Basic auth, login "ci"), with public PyPI as a
# fallback extra-index-url for packages the registry doesn't serve. Mirrors the
# dependably-community pipeline's REGISTRY_URL/REGISTRY_KEY wiring and HARD-FAILS
# when either is empty. Credentials are embedded in the index-url so pip carries
# them through to the package-download URLs on the same host (netrc alone was not
# applied to the /packages/ fetch -> HTTP 403). GitLab masks REGISTRY_KEY in job
# logs. Set REGISTRY_URL + REGISTRY_KEY as UNPROTECTED, masked CI/CD variables so
# merge-request pipelines (unprotected branches) can install too.
.registry_setup: &registry_setup |
  if [ -z "${REGISTRY_URL:-}" ] || [ -z "${REGISTRY_KEY:-}" ]; then
    echo "ERROR: REGISTRY_URL/REGISTRY_KEY are empty — refusing to install from public PyPI." >&2
    exit 1
  fi
  REGISTRY_HOST=$(printf '%s' "$REGISTRY_URL" | sed -E 's#^https?://##; s#/.*##')
  mkdir -p "$HOME/.config/pip"
  printf '[global]\nindex-url = https://ci:%s@%s/simple/\nextra-index-url = https://pypi.org/simple/\n' \
    "$REGISTRY_KEY" "$REGISTRY_HOST" > "$HOME/.config/pip/pip.conf"

# Reusable editable-install + pip cache (keyed on the project metadata).
.dev_install: &dev_install
  cache:
    key:
      files:
        - pyproject.toml
        - requirements-dev.txt
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - *registry_setup
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"

lint:
  stage: test
  <<: *dev_install
  script:
    - black --check src/ tests/
    - flake8 src/ tests/
    - mypy src/

unit-tests:
  stage: test
  <<: *dev_install
  script:
    - pip install pytest-cov "coverage[toml]"
    - python -m pytest tests/ --cov=src --cov-report=xml --cov-report=term
    # Dogfood the tool against this repo: unused-import check (src/ only — the
    # fixtures intentionally carry unused imports) + committed config validation.
    - python src/checker.py --check src/
    - python src/checker.py --validate .
  coverage: '/TOTAL.*?(\d+\%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

# Secret scan — fail the pipeline on a committed secret. Pinned by digest so the
# scanner version can't drift. GIT_DEPTH 0 fetches full history. Prefer a fast
# incremental scan (CI_COMMIT_BEFORE_SHA..HEAD); fall back to a FULL-history scan
# when the "before" SHA is unusable (first push sentinel, or unreachable after a
# force-push) so a secret hidden in earlier/rewritten history can't slip the gate.
# --only-verified keeps it fast/false-positive-free; --fail hard-fails.
secret-scan:
  stage: test
  image:
    name: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
    # Pristine clone so the scan only sees commits reachable from this ref — a
    # reused (fetch-strategy) build dir can retain force-pushed-away objects.
    GIT_STRATEGY: clone
  script:
    - |
      BEFORE="${CI_COMMIT_BEFORE_SHA}"
      if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
        echo "No usable base commit (first push / force-push) — scanning full history"
        trufflehog git file://. --only-verified --fail
      else
        trufflehog git file://. --since-commit "$BEFORE" --only-verified --fail
      fi

# Full-history, all-detectors sweep (no --since-commit, no --only-verified) — the
# thorough counterpart to the fast verified-only gate above. tests/fixtures hold
# intentional, obviously-fake "planted" secrets used as validator test data, so
# they're excluded via .trufflehog-exclude; a real finding fails the pipeline.
secret-scan-deep:
  stage: test
  image:
    name: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a
    entrypoint: [""]
  variables:
    GIT_DEPTH: 0
    # Pristine clone so the full-history scan only sees commits reachable from
    # this ref, not force-pushed-away objects lingering in a reused build dir.
    GIT_STRATEGY: clone
  script:
    - trufflehog git file://. --exclude-paths=.trufflehog-exclude --fail

# Snyk Code (SAST) — static analysis of the source for security bugs, using the
# pinned-by-digest snyk/snyk image (same image the sibling pipelines use). This
# is the project's FIRST Snyk run, so it's deliberately advisory: allow_failure
# lets findings surface without blocking merges until they're triaged. Once
# reviewed, flip allow_failure to false to make it a hard gate. The `rules` keep
# the job out of the pipeline until SNYK_TOKEN exists (set UNPROTECTED + masked,
# so merge-request pipelines on unprotected branches can read it).
snyk-code:
  stage: test
  image:
    name: snyk/snyk:linux@sha256:aeb296d943659dccbc7464340bb8741f6e11999cd99644dc92e6d315d6eda3f4
    entrypoint: [""]
  allow_failure: true
  rules:
    - if: '$SNYK_TOKEN'
  script:
    - snyk code test --severity-threshold=high

# SonarQube analysis (quality + coverage). Uses the pinned sonar-scanner-cli
# image; configuration lives in sonar-project.properties. The scanner reads
# SONAR_TOKEN / SONAR_HOST_URL from the environment. Scoped to the default branch
# (post-merge) to avoid per-MR noise, and advisory (allow_failure) for this first
# integration — flip to a gate once the quality profile is tuned.
sonarqube-check:
  stage: test
  image:
    name: sonarsource/sonar-scanner-cli:11@sha256:46341f2c2dc560381414e90347885f5cddc716db080adcbafc1cac13e1473094
    entrypoint: [""]
  needs:
    - job: unit-tests
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  rules:
    - if: '$SONAR_TOKEN && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$SONAR_TOKEN && $CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: true
  script:
    - sonar-scanner

build:
  stage: build
  before_script:
    - *registry_setup
  script:
    - python -m pip install --upgrade pip build
    - python -m build
  artifacts:
    paths:
      - dist/*
    expire_in: 1 week

# Software Bill of Materials (CycloneDX, spec 1.6). The SBOM must describe what
# *this project* ships, so it is generated from a clean virtualenv containing
# ONLY pycheck's runtime dependencies (zero third-party deps — stdlib only).
# The generator (cyclonedx-bom) is installed in the job's base environment and
# kept OUT of the scanned venv; otherwise its own dependency tree (e.g. lxml)
# leaks into the SBOM as spurious components/vulnerabilities. cyclonedx-bom pinned.
# The `reports:cyclonedx` artifact publishes the SBOM into GitLab itself — it is
# ingested into the project's Dependency List (Secure → Dependency list) — in
# addition to being kept as a downloadable file. No external service required;
# the sbom-publish job below additionally ships it to Dependency-Track when that
# is configured.
sbom:
  stage: sbom
  before_script:
    - *registry_setup
  script:
    - python -m venv /tmp/sbom-venv
    - /tmp/sbom-venv/bin/pip install --upgrade pip
    - /tmp/sbom-venv/bin/pip install .
    - python -m pip install --upgrade pip "cyclonedx-bom==4.*"
    - cyclonedx-py environment /tmp/sbom-venv --output-format JSON --outfile sbom.json --schema-version 1.6
  artifacts:
    paths:
      - sbom.json
    reports:
      cyclonedx:
        - sbom.json
    expire_in: 30 days

# Publish the SBOM to Dependency-Track for continuous supply-chain monitoring.
# Default branch only, serialized so two uploads can't race. autoCreate stands the
# project up on first upload; projectVersion tracks the package version. Skips
# cleanly (via the rule below) when the Dependency-Track variables aren't set.
sbom-publish:
  stage: sbom
  interruptible: false  # don't cancel an in-flight Dependency-Track upload
  needs:
    - job: sbom
      artifacts: true
  resource_group: sbom-publish
  # Default branch only, and only when Dependency-Track is configured — absent
  # the DT variables the job is simply not added to the pipeline (no red).
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $dependencyTrack_url && $dependencyTrack_token'
  script:
    - apt-get update && apt-get install --yes --no-install-recommends curl
    - |
      set -eu
      BASE="${dependencyTrack_url%/}"
      PROJECT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
      VERSION=latest
      echo "Publishing SBOM for $PROJECT@$VERSION to $BASE"
      status=$(curl -sS -o /tmp/bom.out -w '%{http_code}' \
        -X POST "$BASE/api/v1/bom" \
        -H "X-Api-Key: $dependencyTrack_token" \
        -F "autoCreate=true" \
        -F "projectName=$PROJECT" \
        -F "projectVersion=$VERSION" \
        -F "bom=@sbom.json")
      case "$status" in
        200) echo "✓ SBOM uploaded";;
        *) echo "SBOM upload failed (HTTP $status):" >&2; cat /tmp/bom.out >&2; exit 1;;
      esac

# Upload built distributions to the private registry. Manual approval, default
# branch only, serialized. Bump the version to release — uploading an existing
# version fails. The `test`/`build` stages are the authoritative quality gate.
publish:
  stage: publish
  interruptible: false  # don't cancel an in-flight registry upload
  dependencies:
    - build
  resource_group: publish
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  before_script:
    - *registry_setup
  script:
    # twine POSTs to this URL directly. The Dependably registry's twine-compatible
    # upload endpoint is /pypi/legacy/ (POST to the bare host hits the SPA fallback
    # and 405s); REGISTRY_URL is the base host shared with pip's /simple/ index, so
    # append the upload path here (trimming any trailing slash to avoid //).
    - UPLOAD_URL="${REGISTRY_URL%/}/pypi/legacy/"
    - python -m pip install --upgrade twine
    - echo "Uploading $(ls dist/) to $UPLOAD_URL"
    - TWINE_USERNAME="${REGISTRY_USER:-__token__}" TWINE_PASSWORD="$REGISTRY_KEY"
      twine upload --non-interactive --repository-url "$UPLOAD_URL" dist/*

# Mirror the source to the public GitHub repo (dependably/pycheck). It sits
# in the final `publish` stage with no `needs:`, so GitLab only makes it
# available once EVERY earlier-stage job (test/build/sbom) on main has passed —
# i.e. "only when main is green." Manual approval, default branch only,
# serialized. Pushes this commit (and tags) to GitHub's main; the GitHub Actions
# CI (.github/workflows/ci.yml) then re-runs trufflehog/tests/build there against
# the public registries.
#
# Required CI/CD variable (Settings → CI/CD → Variables, "Masked", PROTECTED so
# only the default branch can read it):
#   GITHUB_TOKEN  GitHub PAT (or fine-grained token) with `contents: write` on
#                 dependably/pycheck
publish-github:
  stage: publish
  interruptible: false  # don't interrupt an in-flight push
  resource_group: publish-github
  variables:
    # Pristine full-history clone so the mirror push carries the complete history
    # and tags, not a shallow build dir.
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
  before_script:
    # python:3.12-slim ships without git; the runner clones via its own git, but
    # the script below shells out to git directly, so install it here.
    - apt-get update && apt-get install --yes --no-install-recommends git ca-certificates
  script:
    - |
      set -eu
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "ERROR: GITHUB_TOKEN is not set — cannot mirror to GitHub." >&2
        exit 1
      fi
      git remote remove github 2>/dev/null || true
      git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/dependably/pycheck.git"
      echo "Mirroring $CI_COMMIT_SHORT_SHA to github.com/dependably/pycheck (main)"
      git push github "HEAD:refs/heads/$CI_DEFAULT_BRANCH"
      git push github --tags
