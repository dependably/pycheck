name: Bug Report
description: Report a technical issue with Python Library Checker
title: "[BUG] Brief description of the issue"
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below to help us diagnose and fix the issue.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please verify these steps before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am using the latest version of Python Library Checker
          required: true
        - label: I have verified this is a bug and not a feature request
          required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "The tool crashes when processing files with specific import patterns..."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Create a Python file with imports: `import os, sys`
        2. Run command: `python src/checker.py --check test.py`
        3. Observe error: ...
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: "The tool should identify unused imports without crashing..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened (include full error messages)
      placeholder: |
        Traceback (most recent call last):
          File "src/checker.py", line 123, in analyze_file
            ...
    validations:
      required: true

  - type: textarea
    id: sample-code
    attributes:
      label: Sample Code/File
      description: Minimal Python code that reproduces the issue
      render: python
      placeholder: |
        import os
        import sys
        from typing import List
        
        def main():
            print("Hello world")
        
        if __name__ == "__main__":
            main()
    validations:
      required: false

  - type: textarea
    id: command-used
    attributes:
      label: Command Line Used
      description: The exact command that triggered the bug
      render: bash
      placeholder: "python src/checker.py --check --verbose myfile.py"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      description: Which Python version are you using?
      options:
        - "3.12"
        - "3.11"
        - "3.10"
        - "3.9"
        - "3.8"
        - "3.7"
        - "Other (specify in additional context)"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - "Linux"
        - "macOS"
        - "Windows"
        - "Other (specify in additional context)"
    validations:
      required: true

  - type: dropdown
    id: tool-mode
    attributes:
      label: Tool Mode
      description: Which mode were you using when the bug occurred?
      options:
        - "--check (analysis only)"
        - "--cleanup (modify files)"
        - "Both modes affected"
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Complete Error Output
      description: Full error message and stack trace (if any)
      render: text
      placeholder: |
        Please paste the complete output including:
        - Command executed
        - Full error message
        - Stack trace (if applicable)
        - Any verbose output
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: |
        - File size or complexity
        - Special import patterns involved
        - Directory structure details
        - Any workarounds you've found
    validations:
      required: false

  - type: checkboxes
    id: validation
    attributes:
      label: Bug Validation
      description: Technical validation steps
      options:
        - label: The bug is reproducible with a minimal example
          required: false
        - label: The issue occurs with valid Python syntax files
          required: false
        - label: I have tested with both --check and --cleanup modes (if applicable)
          required: false
        - label: I can provide the sample file that causes the issue
          required: false