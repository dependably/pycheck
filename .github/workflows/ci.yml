name: CI

# GitHub Actions CI for the public GitHub mirror (dependably/python-check).
#
# Flow:  secret-scan + lint + test  →  build
#        sbom (production-only CycloneDX 1.6 SBOM, uploaded as a build artifact)
#
# This is the GitHub-side counterpart to .gitlab-ci.yml. GitLab remains the
# authoritative pipeline (lint, tests, security scans, SBOM, private-registry
# publish); GitLab's manual `publish-github` job mirrors the source here, and
# this workflow re-validates it. It installs everything from PUBLIC PyPI — the
# private Dependably registry is GitLab-only.
#
# TruffleHog runs from the same digest-pinned image used by GitLab so the
# scanner version can't drift between the two pipelines.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (the build/publish side-effects live in
# GitLab, so cancelling in-flight GitHub runs is always safe).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TRUFFLEHOG_IMAGE: trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a

jobs:
  # Secret scan — fail the build on a committed secret. Mirrors the GitLab
  # secret-scan / secret-scan-deep jobs (same pinned image): a fast verified-only
  # full-history sweep plus a thorough all-detectors sweep that excludes the
  # tests/ fixtures' intentionally-planted fake secrets (.trufflehog-exclude).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history so a secret in earlier commits can't slip
      - name: Verified secret scan (full history)
        run: |
          docker run --rm -v "$PWD:/repo" "$TRUFFLEHOG_IMAGE" \
            git file:///repo --only-verified --fail
      - name: Deep secret scan (all detectors, fixtures excluded)
        run: |
          docker run --rm -v "$PWD:/repo" "$TRUFFLEHOG_IMAGE" \
            git file:///repo --exclude-paths=/repo/.trufflehog-exclude --fail

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: black --check src/ tests/
      - run: flake8 src/ tests/
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]" pytest-cov "coverage[toml]"
      - run: python -m pytest tests/ --cov=src --cov-report=term
      # Dogfood the tool on this repo, matching the GitLab unit-tests job:
      # unused-import check (src/ only — fixtures carry unused imports on purpose)
      # plus committed-config validation.
      - run: python src/checker.py --check src/
      - run: python src/checker.py --validate .

  build:
    runs-on: ubuntu-latest
    needs: [secret-scan, lint, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*
          retention-days: 7

  # Production-only CycloneDX 1.6 SBOM, uploaded as a build artifact on every run
  # (push / PR / tag). Generated from a venv with ONLY runtime deps installed
  # (`pip install .`, not the `[dev]` extra), so it reflects exactly what ships on
  # PyPI — pycheck itself declares no runtime dependencies, so this captures the true
  # shipped closure. On a `v*` tag the release job downloads this same sbom.json, signs
  # it (keyless OIDC/sigstore), and attaches it to the GitHub Release.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m venv /tmp/sbom-venv && /tmp/sbom-venv/bin/pip install --upgrade pip && /tmp/sbom-venv/bin/pip install .
      - run: pip install cyclonedx-bom
      - run: cyclonedx-py environment /tmp/sbom-venv --output-format JSON --outfile sbom.json --schema-version 1.6
      - uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: sbom.json
          retention-days: 7

  # Release the wheel + sdist with signed SLSA build provenance — runs only on a
  # `v*` tag, and only after the gating jobs pass. The attestation is generated
  # with GitHub's keyless OIDC/sigstore flow (no stored signing key), covers the
  # exact built dist/* bytes by digest, and is retrievable by any consumer with:
  #   gh attestation verify <file> -R dependably/python-check
  # This is what raises the released artifact from SLSA Build L0 to L2.
  release:
    needs: [secret-scan, lint, test, build, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create the GitHub Release + upload the dist files
      id-token: write     # OIDC token for keyless sigstore signing
      attestations: write # store the provenance attestation on the repo
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      # Build ONCE into dist/. Every later step (attest, PyPI upload, release
      # upload) consumes these exact bytes — nothing is rebuilt, so the provenance
      # covers precisely what ships.
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      # Signed build provenance over the wheel + sdist, by digest. Pinned to a
      # full commit SHA (the one third-party-style action this job adds).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"
      # Publish to PyPI. Skipped (not failed) until PYPI_API_TOKEN is set, so the
      # provenance + GitHub Release still produce on the first tagged run.
      - name: Publish to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -eu
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "PYPI_API_TOKEN not set — skipping PyPI upload (provenance + GitHub Release still produced)."
            exit 0
          fi
          twine upload dist/* -u __token__ -p "$PYPI_API_TOKEN"
      # Attach the attested wheel + sdist to a GitHub Release so the exact signed
      # bytes are downloadable and verifiable by digest.
      - name: Publish dist to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/* --clobber
      # Production-dependency SBOM: pull the exact bytes the `sbom` job produced, sign
      # them with the same keyless OIDC/sigstore flow, and attach the SBOM plus its
      # sigstore bundle to the Release so consumers can verify what shipped:
      #   gh attestation verify sbom.json -R dependably/python-check
      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: .
      - name: Attest SBOM
        id: attest_sbom
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sbom.json
      - name: Attach signed SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          cp "${{ steps.attest_sbom.outputs.bundle-path }}" sbom.json.sigstore.json
          gh release upload "$GITHUB_REF_NAME" sbom.json sbom.json.sigstore.json --clobber
