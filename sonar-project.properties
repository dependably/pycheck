sonar.projectKey=moonlitlabs_python-check_AZ7ghdxgena5TNZ7ZTS4
sonar.projectName=python-check

# Wait for the SonarQube quality gate and reflect its result in the job status.
sonar.qualitygate.wait=true

# Application code vs. tests.
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/test_*.py

# tests/fixtures are intentional "bad sample" inputs for the checker (unused
# imports, planted fake secrets) — exclude from analysis and duplication.
sonar.exclusions=tests/fixtures/**

# Coverage produced by the unit-tests job (pytest-cov, cobertura/xml).
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.9, 3.10, 3.11, 3.12, 3.13

sonar.sourceEncoding=UTF-8
